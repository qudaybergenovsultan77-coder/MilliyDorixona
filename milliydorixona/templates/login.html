<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background: url('{{ url_for('static', filename='images/bg.jpg') }}') no-repeat center center/cover;
    height: 100vh;
">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow" style="width: 350px; background-color: rgba(255,255,255,0.9);">
        <div class="text-center mb-3">
             <img src="{{ url_for('static', filename='images/logo.png') }}" width="80">
            <h4 class="m-0 fw-bold text-primary">MilliyDorixona.uz</h4>
        </div>
        <h3 class="text-center mb-3">Kirish</h3>

        <!-- FLASH XABARLAR -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label>Login</label>
                <input type="text" name="username" autocomplete="username" class="form-control" placeholder="Login kiriting" required>
            </div>

            <div class="mb-3">
                <label>Parol</label>
                <input type="password" name="password" autocomplete="username" class="form-control" placeholder="Parol kiriting" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Kirish</button>
        </form>

        <p class="text-center mt-3">
            Hisob yo‘qmi? <a href="/register">Ro‘yxatdan o‘tish</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
