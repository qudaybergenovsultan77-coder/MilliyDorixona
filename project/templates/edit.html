<!DOCTYPE html>
<html>
<head>
    <title>Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="
    background: url('{{ url_for('static', filename='images/bg.jpg') }}') no-repeat center center/cover;
    height: 100vh;
">

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h3 class="mb-3 text-center">Dorini tahrirlash</h3>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Dori nomi</label>
                <input type="text" name="name" value="{{ medicine[1] | e }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Soni</label>
                <input type="number" name="quantity" value="{{ medicine[2] | e }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Narxi</label>
                <input type="number" step="0.01" name="price" value="{{ medicine[3] | e }}" class="form-control">
            </div>

            <div class="mb-3 text-center">
                <p>Hozirgi rasm:</p>
                <img src="{{ url_for('static', filename='uploads/' + medicine[4]) if medicine[4] else 'https://via.placeholder.com/150' }}"
                     width="120" class="rounded">
            </div>

            <div class="mb-3">
                <label>Yangi rasm</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/dashboard" class="btn btn-secondary">Orqaga</a>
                <button type="submit" class="btn btn-success">Saqlash</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
